<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth Test Portal | People's Priorities</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: rgba(17, 24, 39, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --secondary: #10b981;
      --secondary-hover: #059669;
      --google-blue: #4285f4;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, var-color 50%, var(--bg-color) 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient animated backgrounds */
    body::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      top: -100px;
      left: -100px;
      animation: float 15s infinite alternate ease-in-out;
      z-index: 0;
    }

    body::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, transparent 70%);
      bottom: -150px;
      right: -100px;
      animation: float 20s infinite alternate-reverse ease-in-out;
      z-index: 0;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }

    .login-container {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 48px;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      z-index: 10;
      text-align: center;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-container {
      margin-bottom: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%);
      width: 64px;
      height: 64px;
      border-radius: 16px;
      font-size: 32px;
      font-weight: 800;
      color: white;
      box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 36px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      outline: none;
      margin-bottom: 16px;
      text-decoration: none;
    }

    .btn-google {
      background-color: white;
      color: #1f2937;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .btn-google:hover {
      background-color: #f9fafb;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    .btn-google img {
      width: 20px;
      height: 20px;
      margin-right: 12px;
    }

    .btn-mock {
      background: linear-gradient(135deg, var(--secondary) 0%, #06b6d4 100%);
      color: white;
      box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
    }

    .btn-mock:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(16, 185, 129, 0.3);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--card-border);
    }

    .divider:not(:empty)::before {
      margin-right: .5em;
    }

    .divider:not(:empty)::after {
      margin-left: .5em;
    }

    .footer-text {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 24px;
    }

    .footer-text a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-container">P</div>
    <h1>Welcome back</h1>
    <p class="subtitle">Securely log in to People's Priorities</p>

    <!-- Google Login Integration -->
    <a href="/api/auth/google" class="btn btn-google">
      <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google logo">
      Sign in with Google
    </a>

    <div class="divider">or bypass for dev</div>

    <!-- Developer Mock Login Action -->
    <form action="/api/auth/mock" method="GET">
      <button type="submit" class="btn btn-mock">
        ⚡ Dev Mock Sign-in (Neon DB check)
      </button>
    </form>

    <div class="footer-text">
      Need help? Read the <a href="/api/health">system health API</a>.
    </div>
  </div>
</body>
</html>
